

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cailewey</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
}

.hidden{
display:none;
}

/* LOGIN */

.login{

height:100vh;
display:flex;
align-items:center;
justify-content:center;

background:url("https://images.unsplash.com/photo-1558981359-219d6364c9c8") center/cover;
}

.loginCard{

background:white;
padding:35px;
width:320px;

border-radius:15px;

text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.4);

}

input{

width:100%;
padding:12px;
margin:10px 0;

border-radius:8px;
border:1px solid #ccc;

}

button{

width:100%;
padding:14px;

border:none;
border-radius:8px;

margin-top:10px;

cursor:pointer;

}

.primary{
background:black;
color:white;
}

.secondary{
background:#eee;
}

/* APP */

#map{
height:100vh;
width:100%;
}

.panel{

position:fixed;

bottom:0;
left:0;

width:100%;

background:white;

padding:20px;

border-radius:20px 20px 0 0;

box-shadow:0 -5px 20px rgba(0,0,0,0.3);

}

.title{
font-size:20px;
margin-bottom:10px;
}

.sos{

background:red;
color:white;

font-weight:bold;

}

</style>
</head>

<body>

<!-- LOGIN -->

<div class="login" id="loginScreen">

<div class="loginCard">

<h2>Cailewey</h2>
<p>Tu amigo en el camino</p>

<input placeholder="Usuario">
<input type="password" placeholder="Contraseña">

<button class="primary" onclick="login()">
Iniciar sesión
</button>

<button onclick="forgot()">
Olvidé contraseña
</button>

<button class="secondary" onclick="createAccount()">
Crear cuenta
</button>

</div>

</div>

<!-- APP -->

<div id="app" class="hidden">

<div id="map"></div>

<div class="panel">

<div class="title">
Asistencia para motocicletas
</div>

<button class="primary" onclick="requestHelp()">
Solicitar asistencia
</button>

<button class="sos" onclick="sos()">
SOS emergencia
</button>

<button class="secondary" onclick="logout()">
Cerrar sesión
</button>

</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

let map

function login(){

document.getElementById("loginScreen").classList.add("hidden")
document.getElementById("app").classList.remove("hidden")

initMap()

}

function logout(){

document.getElementById("app").classList.add("hidden")
document.getElementById("loginScreen").classList.remove("hidden")

}

function forgot(){
alert("Recuperación de contraseña")
}

function createAccount(){
alert("Registro de usuario")
}

/* MAPA */

function initMap(){

map = L.map('map').setView([20.6597,-103.3496],13)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map)

/* ubicacion usuario */

navigator.geolocation.getCurrentPosition(function(pos){

let lat = pos.coords.latitude
let lon = pos.coords.longitude

L.marker([lat,lon])
.addTo(map)
.bindPopup("Tu ubicación")
.openPopup()

map.setView([lat,lon],14)

})

/* tecnicos cercanos simulados */

let tech1 = L.marker([20.66,-103.34]).addTo(map)
.bindPopup("Técnico motocicletas")

let tech2 = L.marker([20.65,-103.36]).addTo(map)
.bindPopup("Asistencia vial")

}

function requestHelp(){

alert("Solicitud enviada a técnicos cercanos")

}

function sos(){

alert("SOS enviado. Técnico en camino")

}

</script>

</body>
</html>
